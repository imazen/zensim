name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features --exclude zensim-wasm-tests -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-latest
          - macos-15-intel
          - macos-26-intel
    env:
      REGRESS_MANIFEST_PATH: test-manifest.tsv
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude zensim-wasm-tests -- --nocapture
      - name: Upload test manifest
        uses: actions/upload-artifact@v7
        with:
          name: test-manifest-${{ matrix.os }}
          path: test-manifest.tsv
          if-no-files-found: ignore
        if: always()

  test-all-features:
    name: Test all features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --exclude zensim-wasm-tests -- --nocapture

  feature-matrix:
    name: Feature permutations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check all feature permutations
        run: |
          set -e
          features_list=(
            ""
            "avx512"
            "imgref"
            "training"
            "classification"
            "zenpixels"
            "avx512,imgref"
            "avx512,training"
            "avx512,classification"
            "avx512,zenpixels"
            "imgref,training"
            "imgref,classification"
            "imgref,zenpixels"
            "training,classification"
            "avx512,imgref,training"
            "avx512,imgref,classification"
            "avx512,imgref,zenpixels"
            "avx512,training,classification"
            "imgref,training,classification"
            "avx512,imgref,training,classification"
            "avx512,imgref,training,classification,zenpixels"
            "imgref,classification"
          )
          for features in "${features_list[@]}"; do
            if [ -z "$features" ]; then
              label="none"
              flags="--no-default-features"
            else
              label="$features"
              flags="--no-default-features --features $features"
            fi
            echo "::group::Clippy + test: $label"
            cargo clippy -p zensim $flags --lib -- -D warnings
            cargo test -p zensim $flags --lib -- --nocapture
            echo "::endgroup::"
          done

  corpus-tests:
    name: Corpus ICC tests
    runs-on: ubuntu-latest
    env:
      REGRESS_REFERENCE_URL: https://imageflow-resources.s3.amazonaws.com/test_inputs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p zensim --test corpus_icc -- --ignored --nocapture

  wasm:
    name: WASM SIMD128
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - uses: bytecodealliance/actions/wasmtime/setup@v1
      - name: Test under wasmtime
        run: |
          cargo test --target wasm32-wasip1 -p zensim-wasm-tests -- --nocapture
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime run --dir=. --"
          RUSTFLAGS: "-C target-feature=+simd128"

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo hack check --rust-version --workspace --exclude zensim-validate --exclude zensim-bench --exclude zensim-wasm-tests

  no-leakage:
    name: zensim-regress public API leakage check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api
      - name: Forbid zen-ecosystem types in zensim-regress public API
        run: |
          set -euo pipefail
          # Capture the full public API surface (including pub re-exports
          # and reachable trait bounds).
          api=$(cargo public-api -p zensim-regress)
          echo "$api"
          # Forbidden type prefixes — these crates would force a downstream
          # consumer of zensim-regress to share the same major (or 0.x) version
          # we depend on, breaking any project that pins a different version.
          # `zensim::` is intentionally allowed: zensim-regress is the regression
          # layer for zensim and shares its semver lifecycle.
          forbidden=(
            "zenpixels::"
            "zenresize::"
            "zenpng::"
            "zenblend::"
            "enough::"
            "imgref::"
            "rgb::Rgba"
            "rgb::Rgb"
            "bytemuck::"
            " image::"
          )
          fail=0
          for f in "${forbidden[@]}"; do
            if echo "$api" | grep -qF -- "$f"; then
              echo "::error::Forbidden type prefix '$f' appears in zensim-regress public API"
              echo "$api" | grep -F -- "$f" || true
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::zensim-regress is leaking zen-ecosystem types in its public API."
            echo "Wrap such types behind the crate-internal pixel_ops module (see CLAUDE.md)."
            exit 1
          fi

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --workspace --all-features --exclude zensim-wasm-tests --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
