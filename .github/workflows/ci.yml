name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-latest
          - macos-15-intel
          - macos-26-intel
    env:
      REGRESS_MANIFEST_PATH: test-manifest.tsv
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace -- --nocapture
      - name: Upload test manifest
        uses: actions/upload-artifact@v4
        with:
          name: test-manifest-${{ matrix.os }}
          path: test-manifest.tsv
          if-no-files-found: ignore
        if: always()

  test-all-features:
    name: Test all features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features -- --nocapture

  feature-matrix:
    name: Feature permutations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check all feature permutations
        run: |
          set -e
          features_list=(
            ""
            "avx512"
            "imgref"
            "training"
            "classification"
            "avx512,imgref"
            "avx512,training"
            "avx512,classification"
            "imgref,training"
            "imgref,classification"
            "training,classification"
            "avx512,imgref,training"
            "avx512,imgref,classification"
            "avx512,training,classification"
            "imgref,training,classification"
            "avx512,imgref,training,classification"
          )
          for features in "${features_list[@]}"; do
            if [ -z "$features" ]; then
              label="none"
              flags="--no-default-features"
            else
              label="$features"
              flags="--no-default-features --features $features"
            fi
            echo "::group::Clippy + test: $label"
            cargo clippy -p zensim $flags --lib -- -D warnings
            cargo test -p zensim $flags --lib -- --nocapture
            echo "::endgroup::"
          done

  corpus-tests:
    name: Corpus ICC tests
    runs-on: ubuntu-latest
    env:
      REGRESS_REFERENCE_URL: https://imageflow-resources.s3.amazonaws.com/test_inputs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p zensim --test corpus_icc -- --ignored --nocapture

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo hack check --rust-version --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
