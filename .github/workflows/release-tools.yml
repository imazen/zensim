name: Release Tools

on:
  push:
    tags:
      - "tools-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            binary: regress_report
            asset: regress_report-linux-x64

          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            binary: regress_report
            asset: regress_report-linux-arm64

          - name: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            binary: regress_report
            asset: regress_report-macos-x64

          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: regress_report
            asset: regress_report-macos-arm64

          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: regress_report.exe
            asset: regress_report-windows-x64.exe

          - name: windows-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary: regress_report.exe
            asset: regress_report-windows-arm64.exe

    runs-on: ${{ matrix.os }}
    name: "Build ${{ matrix.name }}"

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build regress_report
        run: cargo build -p zensim-regress --bin regress_report --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect binaries
        run: |
          mkdir -p release/
          for dir in artifacts/regress_report-*/; do
            cp "$dir"/* release/
          done
          chmod +x release/regress_report-*
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
