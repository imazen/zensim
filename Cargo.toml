[workspace]
resolver = "2"
members = ["zensim", "zensim-cli", "zensim-validate", "zensim-regress"]

[profile.release]
lto = "thin"
codegen-units = 1

[profile.dev]
opt-level = 2

[profile.dev.package."*"]
opt-level = 2

[workspace.dependencies]
zensim = { path = "zensim" }
archmage = { version = "0.8.6", features = ["macros", "safe_unaligned_simd", "avx512"] }
magetypes = { version = "0.8.6", features = ["avx512"] }
bytemuck = { version = "1.25", default-features = false }
thiserror = "2"
image = "0.25"
rayon = "1.10"
imgref = "1.12"
rgb = { version = "0.8", default-features = false, features = ["as-bytes"] }
half = { version = "2", default-features = false }
zencodec-types = { git = "https://github.com/imazen/zencodec-types.git" }
zenpixels = { path = "../zenpixels", default-features = false, features = ["std"] }
