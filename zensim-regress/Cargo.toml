[package]
name = "zensim-regress"
version = "0.1.0"
edition = "2024"
description = "Visual regression testing persistence and workflow for zensim"
repository = "https://github.com/imazen/zensim"
license = "MIT"
rust-version = "1.89.0"
publish = false

[features]
## Enable format-aware generators, hashing, and ChecksumManager workflows via zenpixels.
# zenpixels = ["dep:zenpixels", "zensim/zenpixels"]
## Use zenpng for faster PNG decode/encode of reference images (instead of `image` crate).
## To activate: uncomment zenpng/enough deps below and in workspace Cargo.toml,
## then change this to: zenpng = ["dep:zenpng", "dep:enough"]
zenpng = []

[dependencies]
zensim = { workspace = true }
# zenpixels = { workspace = true, optional = true }
# zenpng = { workspace = true, optional = true }
# enough = { workspace = true, optional = true }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
seahash = "4"
image = { workspace = true }
thiserror = { workspace = true }
fs2 = "0.4.3"
base64 = "0.22"

[dev-dependencies]
tempfile = "3"

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = ['cfg(feature, values("zenpixels"))']
