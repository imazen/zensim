[package]
name = "zensim"
version = "0.1.0"
edition = "2024"
description = "Fast psychovisual image similarity metric"
repository = "https://github.com/imazen/zensim"
license = "MIT"
rust-version = "1.85.0"

[features]
default = ["avx512"]
avx512 = ["archmage/avx512", "magetypes/avx512"]
## Exposes training/research API: ZensimConfig, compute_zensim_with_config,
## score_from_features, WEIGHTS, FEATURES_PER_SCALE. These items control
## metric internals (blur kernel, scale count, masking) whose outputs are
## incomparable with the default trained weights.
training = []

[dependencies]
archmage = { workspace = true }
magetypes = { workspace = true }
rayon = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
image = { workspace = true }
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support"] }

[[bench]]
name = "bench_zensim"
harness = false

[lints.clippy]
uninlined_format_args = "allow"
